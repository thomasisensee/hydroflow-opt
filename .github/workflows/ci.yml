name: CI

on:
  # We run CI on pushes to the main branch
  push:
    branches:
      - main
  # and on all pull requests to the main branch
  pull_request:
    branches:
      - main
  # as well as upon manual triggers through the 'Actions' tab of the Github UI
  workflow_dispatch:

jobs:
  build-and-test:
    name: Testing on ubuntu-latest
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Here, we are testing the oldest and the newest supported Python version.
        python-version: ["3.11", "3.13"]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v7
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Python package
      run: |
        python -m pip install .[tests]

    - name: Run Python tests
      run: |
        python -m pytest

  coverage:
    name: Coverage Testing
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - uses: actions/setup-python@v7
      with:
        python-version: "3.13"

    - name: Install Python package
      working-directory: ${{ github.workspace }}
      run: |
        python -m pip install -v -e .[tests]

    - name: Run Python tests
      working-directory: ${{ github.workspace }}
      run: |
        python -m pytest \
          --cov=hydroflow_opt \
          --cov-report=term-missing \
          --cov-report=xml:coverage.xml

    - name: Inspect coverage report
      working-directory: ${{ github.workspace }}
      run: |
        ls -lh coverage.xml
        python -m coverage report
        head -30 coverage.xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v7
      with:
        disable_search: true
        fail_ci_if_error: true
        files: ${{github.workspace}}/coverage.xml
        plugins: noop
        slug: thomasisensee/hydroflow-opt
        token: ${{ secrets.CODECOV_TOKEN }}
        verbose: true

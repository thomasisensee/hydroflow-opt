codecov:
  require_ci_to_pass: true

coverage:
  precision: 2
  round: down
  range: "70...100"
  status:
    project:
      default:
        target: 75

comment:
  layout: "condensed_header,flags,condensed_files,condensed_footer"
  behavior: default
  require_changes: false

ignore:
  - "examples/**"
  - "doc/**"
  - "tests/**"
